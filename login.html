        <meta charset="utf-8" />

            rel="stylesheet"
        />
        <link href="/assets/styles.css" rel="stylesheet" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
            <div class="container">
                <img
                    src="/assets/phishguard_icon.svg"
                    alt="PhishGuard logo"
                    width="32"
                />
                <a class="navbar-brand" href="index.html">PhishGuard</a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navMain"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navMain">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="what-is-phishing.html"
                                >What is Phishing</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="real-examples.html"
                                >Real Examples</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="api-data.html"
                                >API Data</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="prevention.html"
                                >Prevention</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="login.html"
                                >Login</a
                            >
                        </li>
                    </ul>

                    <button
                        class="btn btn-outline-light btn-sm"
                        type="button"
                        id="translateBtn"
                        aria-label="Prevedi sadržaj"
                    >
                        SR/EN
                    </button>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="hero mb-3">
                        <h1 class="mb-2">Prijava</h1>
                    </div>

                    <div class="card p-4">
                        <form
                            id="loginForm"
                            autocomplete="off"
                            novalidate
                            onsubmit="return validateForm(event);"
                        >
                            <div class="mb-3">
                                <label class="form-label"
                                    >Email ili ime i prezime</label
                                >
                                <input
                                    id="loginUser"
                                    class="form-control"
                                    type="text"
                                    placeholder="—"
                                />
                                <div
                                    class="invalid-feedback"
                                    id="userFeedback"
                                ></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Lozinka</label>
                                <input
                                    id="loginPass"
                                    class="form-control"
                                    type="password"
                                    placeholder="••••••••"
                                />
                                <div
                                    class="invalid-feedback"
                                    id="passFeedback"
                                ></div>
                            </div>

                            <div
                                class="text-danger small mb-2"
                                id="errorMsg"
                            ></div>

                            <button
                                class="btn btn-primary w-100 mt-3"
                                type="submit"
                            >
                                Prijavi se
                            </button>
                        </form>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a class="text-decoration-none" href="contact.html"
                            >← Prethodna</a
                        >
                        <a class="text-decoration-none" href="index.html"
                            >Sledeća →</a
                        >
                    </div>
                </div>
            </div>
        </main>

            >

                        Edukativni sajt o phishing napadima
                    </div>
                </div>

                <div class="footer-links">
                    <a href="contact.html">Kontakt</a>
                    <a href="prevention.html">About us</a>
                    <a href="api-data.html">API</a>
                    <a href="login.html">Login</a>
                </div>
            </div>

            <div class="container footer-bottom">© 2026 PhishGuard</div>
        </footer>
